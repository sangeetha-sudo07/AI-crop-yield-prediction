<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Yield Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            text-align:center;
            padding:20px;
        }

        .container{
            width:350px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:8px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:green;
        }
    </style>
</head>

<body>

<div class="container">

<h1>🌾 AI Crop Yield Prediction</h1>

<input type="text" id="crop" placeholder="Crop Name">

<input type="number" id="rainfall" placeholder="Rainfall (mm)">

<input type="number" id="temperature" placeholder="Temperature (°C)">

<input type="number" id="soil" placeholder="Soil Fertility (1-10)">

<br><br>

<button onclick="predictYield()">
Predict Yield
</button>

<div id="result"></div>

</div>

<script>

function predictYield(){

    let crop =
    document.getElementById("crop").value;

    let rainfall =
    Number(document.getElementById("rainfall").value);

    let temperature =
    Number(document.getElementById("temperature").value);

    let soil =
    Number(document.getElementById("soil").value);

    let output = "";

    if(rainfall > 1000 && temperature<= 45 && soil >= 7){
        output = "High Yield Expected";
    }
    else if(rainfall >= 700 && temperature<= 60 && soil >= 5){
        output = "Medium Yield Expected";
    }
    else{
        output = "Low Yield Expected";
    }

    document.getElementById("result").innerHTML =
    "Crop: " + crop +
    "<br>Prediction: " + output;
}

</script>

</body>
</html>
